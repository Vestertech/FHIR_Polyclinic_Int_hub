version: '3.8'

services:
  fhir-server:
    image: hapiproject/hapi:latest
    container_name: hapi-fhir-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    # Remove environment variables - they're now in hapi.application.yaml
    # The configuration file handles everything!
    volumes:
      - ./hapi.application.yaml:/app/config/application.yaml